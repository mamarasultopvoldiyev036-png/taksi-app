<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tezkor Taksi</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBxi2GmJXq9oG0J5qA9uL_8xq0q0q0q0q0&libraries=places"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .location-group {
            margin-bottom: 20px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 15px;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
        }

        .location-input {
            width: 100%;
            padding: 18px 20px 18px 50px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-size: 16px;
            transition: all 0.3s;
            background: white;
        }

        .location-input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .location-input::placeholder {
            color: #999;
        }

        .swap-btn {
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            background: #667eea;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
            transition: all 0.3s;
            z-index: 10;
        }

        .swap-btn:hover {
            background: #764ba2;
            transform: translateY(-50%) rotate(180deg);
        }

        .map-container {
            margin: 20px 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #map {
            height: 200px;
            width: 100%;
        }

        .price-card {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-info {
            flex: 1;
        }

        .price-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .price-value {
            font-size: 32px;
            font-weight: 700;
            color: #333;
        }

        .price-currency {
            font-size: 16px;
            color: #666;
            margin-left: 5px;
        }

        .discount-badge {
            background: #10b981;
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
        }

        .promo-section {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }

        .promo-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .promo-btn {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 0 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .promo-btn:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        .promo-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .promo-message {
            font-size: 12px;
            margin-top: 5px;
            padding: 5px 10px;
            border-radius: 10px;
            display: none;
        }

        .promo-message.success {
            display: block;
            background: #d1fae5;
            color: #10b981;
        }

        .promo-message.error {
            display: block;
            background: #fee2e2;
            color: #ef4444;
        }

        .features {
            display: flex;
            justify-content: space-around;
            margin: 25px 0;
            padding: 15px 0;
            border-top: 2px dashed #e0e0e0;
            border-bottom: 2px dashed #e0e0e0;
        }

        .feature-item {
            text-align: center;
        }

        .feature-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .feature-text {
            font-size: 12px;
            color: #666;
        }

        .submit-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(102,126,234,0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #fee2e2;
            color: #ef4444;
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .success-message {
            background: #d1fae5;
            color: #10b981;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: scaleIn 0.3s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .recent-places {
            margin: 20px 0;
        }

        .recent-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .recent-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .recent-btn {
            background: #f0f0f0;
            border: none;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14px;
            color: #333;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .recent-btn:hover {
            background: #667eea;
            color: white;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 20px 15px;
            }

            .header h1 {
                font-size: 28px;
            }

            .price-value {
                font-size: 24px;
            }

            .features {
                flex-wrap: wrap;
                gap: 15px;
            }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #1a1a2e, #16213e);
            }

            .card {
                background: rgba(26, 26, 46, 0.95);
            }

            .header h1 {
                background: linear-gradient(135deg, #667eea, #9f7aea);
                -webkit-background-clip: text;
            }

            .header p {
                color: #a0aec0;
            }

            .location-input {
                background: #2d3748;
                border-color: #4a5568;
                color: white;
            }

            .location-input::placeholder {
                color: #718096;
            }

            .price-card {
                background: #2d3748;
            }

            .price-label {
                color: #a0aec0;
            }

            .price-value {
                color: white;
            }

            .feature-text {
                color: #a0aec0;
            }

            .recent-btn {
                background: #2d3748;
                color: white;
            }

            .recent-btn:hover {
                background: #667eea;
            }

            .promo-input {
                background: #2d3748;
                border-color: #4a5568;
                color: white;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🚖 TEZKOR TAKSI</h1>
                <p>Eng tez va qulay taksi xizmati</p>
            </div>

            <!-- Asosiy forma -->
            <div id="mainForm">
                <div class="location-group">
                    <div class="input-wrapper">
                        <span class="input-icon">📍</span>
                        <input type="text" 
                               id="fromInput" 
                               class="location-input" 
                               placeholder="Qayerdan?"
                               autocomplete="off">
                        <div class="swap-btn" id="swapBtn" onclick="swapLocations()">⇅</div>
                    </div>

                    <div class="input-wrapper">
                        <span class="input-icon">🏁</span>
                        <input type="text" 
                               id="toInput" 
                               class="location-input" 
                               placeholder="Qayerga?"
                               autocomplete="off">
                    </div>
                </div>

                <!-- Oxirgi manzillar -->
                <div class="recent-places" id="recentPlaces" style="display: none;">
                    <div class="recent-title">📌 Oxirgi manzillar</div>
                    <div class="recent-buttons" id="recentButtons"></div>
                </div>

                <!-- Xarita -->
                <div class="map-container">
                    <div id="map"></div>
                </div>

                <!-- Narx va ma'lumotlar -->
                <div class="price-card">
                    <div class="price-info">
                        <div class="price-label">Taxminiy narx</div>
                        <div>
                            <span class="price-value" id="price">4000</span>
                            <span class="price-currency">so'm</span>
                        </div>
                        <div style="font-size: 12px; color: #666; margin-top: 5px;">
                            <span id="distance">0</span> km • <span id="duration">0</span> min
                        </div>
                    </div>
                    <div class="discount-badge" id="discountBadge" style="display: none;">0%</div>
                </div>

                <!-- Promokod -->
                <div class="promo-section">
                    <input type="text" 
                           id="promoCode" 
                           class="promo-input" 
                           placeholder="🎫 Promokod"
                           maxlength="20">
                    <button class="promo-btn" id="applyPromo">Tekshirish</button>
                </div>
                <div id="promoMessage" class="promo-message"></div>

                <!-- Xususiyatlar -->
                <div class="features">
                    <div class="feature-item">
                        <div class="feature-icon">⚡</div>
                        <div class="feature-text">Tez yetib kelish</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">💰</div>
                        <div class="feature-text">Qulay narxlar</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">⭐</div>
                        <div class="feature-text">Ishonchli haydovchilar</div>
                    </div>
                </div>

                <!-- Buyurtma berish tugmasi -->
                <button class="submit-btn" id="submitBtn" onclick="submitOrder()">
                    🚖 Buyurtma berish
                </button>
            </div>

            <!-- Muvaffaqiyatli buyurtma xabari -->
            <div id="successMessage" class="success-message">
                ✅ Buyurtmangiz qabul qilindi! <br>
                <small>Haydovchi qabul qilishini kuting...</small>
            </div>

            <!-- Xatolik xabari -->
            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>

    <script>
        // Telegram Web App inicializatsiya
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.enableClosingConfirmation();

        // Global o'zgaruvchilar
        let map;
        let fromAutocomplete;
        let toAutocomplete;
        let fromMarker;
        let toMarker;
        let directionsService;
        let directionsRenderer;
        let currentDiscount = 0;
        let fromLocation = null;
        let toLocation = null;
        let recentPlaces = JSON.parse(localStorage.getItem('recentPlaces') || '[]');

        // Konstantalar
        const MIN_PRICE = 4000;
        const PRICE_PER_KM = 1500;
        const PRICE_PER_MIN = 600;

        // Sahifa yuklanganda
        window.onload = function() {
            initMap();
            initAutocomplete();
            loadRecentPlaces();
            setupEventListeners();
            updateMainButton();
        };

        // Xaritani yaratish
        function initMap() {
            const defaultLocation = { lat: 41.2995, lng: 69.2401 }; // Toshkent

            map = new google.maps.Map(document.getElementById('map'), {
                center: defaultLocation,
                zoom: 12,
                styles: [
                    {
                        featureType: 'poi',
                        elementType: 'labels',
                        stylers: [{ visibility: 'off' }]
                    }
                ],
                mapTypeControl: false,
                fullscreenControl: false,
                streetViewControl: false
            });

            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                suppressMarkers: true,
                polylineOptions: {
                    strokeColor: '#667eea',
                    strokeWeight: 5
                }
            });

            // Foydalanuvchi lokatsiyasini olish
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const userLocation = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };
                        map.setCenter(userLocation);
                        map.setZoom(14);
                        
                        // "Qayerdan" maydoniga hozirgi joyni yozish
                        if (!fromInput.value) {
                            getAddressFromCoords(userLocation, 'from');
                        }
                    },
                    () => {
                        console.log('Geolokatsiya ruxsati yo\'q');
                    }
                );
            }
        }

        // Autocompleteni sozlash
        function initAutocomplete() {
            const options = {
                componentRestrictions: { country: 'uz' },
                fields: ['formatted_address', 'geometry', 'name'],
                types: ['geocode', 'establishment']
            };

            fromAutocomplete = new google.maps.places.Autocomplete(
                document.getElementById('fromInput'),
                options
            );
            
            toAutocomplete = new google.maps.places.Autocomplete(
                document.getElementById('toInput'),
                options
            );

            fromAutocomplete.addListener('place_changed', () => {
                const place = fromAutocomplete.getPlace();
                if (place.geometry) {
                    fromLocation = {
                        lat: place.geometry.location.lat(),
                        lng: place.geometry.location.lng(),
                        address: place.formatted_address || place.name
                    };
                    
                    updateMapMarkers();
                    calculateRoute();
                }
            });

            toAutocomplete.addListener('place_changed', () => {
                const place = toAutocomplete.getPlace();
                if (place.geometry) {
                    toLocation = {
                        lat: place.geometry.location.lat(),
                        lng: place.geometry.location.lng(),
                        address: place.formatted_address || place.name
                    };
                    
                    updateMapMarkers();
                    calculateRoute();
                }
            });
        }

        // Koordinatadan manzil olish
        function getAddressFromCoords(location, field) {
            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ location: location }, (results, status) => {
                if (status === 'OK' && results[0]) {
                    if (field === 'from') {
                        document.getElementById('fromInput').value = results[0].formatted_address;
                        fromLocation = {
                            lat: location.lat,
                            lng: location.lng,
                            address: results[0].formatted_address
                        };
                    }
                    updateMapMarkers();
                }
            });
        }

        // Xarita markerlarini yangilash
        function updateMapMarkers() {
            if (fromMarker) fromMarker.setMap(null);
            if (toMarker) toMarker.setMap(null);

            if (fromLocation) {
                fromMarker = new google.maps.Marker({
                    position: fromLocation,
                    map: map,
                    icon: {
                        url: 'https://maps.google.com/mapfiles/ms/icons/green-dot.png',
                        scaledSize: new google.maps.Size(40, 40)
                    },
                    title: 'Qayerdan'
                });
            }

            if (toLocation) {
                toMarker = new google.maps.Marker({
                    position: toLocation,
                    map: map,
                    icon: {
                        url: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png',
                        scaledSize: new google.maps.Size(40, 40)
                    },
                    title: 'Qayerga'
                });
            }

            // Kamerani sozlash
            if (fromLocation && toLocation) {
                const bounds = new google.maps.LatLngBounds();
                bounds.extend(fromLocation);
                bounds.extend(toLocation);
                map.fitBounds(bounds, 50);
            } else if (fromLocation) {
                map.setCenter(fromLocation);
                map.setZoom(14);
            } else if (toLocation) {
                map.setCenter(toLocation);
                map.setZoom(14);
            }
        }

        // Yo'nalishni hisoblash
        function calculateRoute() {
            if (!fromLocation || !toLocation) return;

            const request = {
                origin: fromLocation,
                destination: toLocation,
                travelMode: 'DRIVING',
                unitSystem: google.maps.UnitSystem.METRIC
            };

            directionsService.route(request, (result, status) => {
                if (status === 'OK') {
                    directionsRenderer.setDirections(result);
                    
                    const route = result.routes[0].legs[0];
                    const distance = route.distance.value / 1000; // km
                    const duration = route.duration.value / 60; // minutes
                    
                    document.getElementById('distance').textContent = distance.toFixed(1);
                    document.getElementById('duration').textContent = Math.round(duration);
                    
                    calculatePrice(distance, duration);
                    
                    // Oxirgi manzillarga qo'shish
                    addToRecentPlaces(fromLocation.address, toLocation.address);
                }
            });
        }

        // Narxni hisoblash
        function calculatePrice(distance, duration) {
            let price = MIN_PRICE + (distance * PRICE_PER_KM) + (duration * PRICE_PER_MIN);
            
            if (currentDiscount > 0) {
                price = price * (100 - currentDiscount) / 100;
            }
            
            price = Math.round(price / 100) * 100;
            document.getElementById('price').textContent = price.toLocaleString();
            
            return price;
        }

        // Joylarni almashtirish
        function swapLocations() {
            const fromInput = document.getElementById('fromInput');
            const toInput = document.getElementById('toInput');
            const fromVal = fromInput.value;
            const toVal = toInput.value;
            
            fromInput.value = toVal;
            toInput.value = fromVal;
            
            const tempLocation = fromLocation;
            fromLocation = toLocation;
            toLocation = tempLocation;
            
            updateMapMarkers();
            calculateRoute();
        }

        // Oxirgi manzillarni yuklash
        function loadRecentPlaces() {
            const recentButtons = document.getElementById('recentButtons');
            const recentPlacesDiv = document.getElementById('recentPlaces');
            
            if (recentPlaces.length > 0) {
                recentPlacesDiv.style.display = 'block';
                recentButtons.innerHTML = '';
                
                recentPlaces.slice(0, 5).forEach((place, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'recent-btn';
                    btn.innerHTML = `📍 ${place.from.split(',')[0]}`;
                    btn.onclick = () => {
                        document.getElementById('fromInput').value = place.from;
                        document.getElementById('toInput').value = place.to;
                        
                        // Geocode qilish
                        geocodeAddress(place.from, 'from');
                        geocodeAddress(place.to, 'to');
                    };
                    recentButtons.appendChild(btn);
                });
            } else {
                recentPlacesDiv.style.display = 'none';
            }
        }

        // Oxirgi manzillarga qo'shish
        function addToRecentPlaces(from, to) {
            const newPlace = { from, to, timestamp: Date.now() };
            recentPlaces = [newPlace, ...recentPlaces.filter(p => p.from !== from || p.to !== to)];
            
            if (recentPlaces.length > 10) {
                recentPlaces = recentPlaces.slice(0, 10);
            }
            
            localStorage.setItem('recentPlaces', JSON.stringify(recentPlaces));
            loadRecentPlaces();
        }

        // Geocode qilish
        function geocodeAddress(address, field) {
            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ address: address }, (results, status) => {
                if (status === 'OK' && results[0]) {
                    if (field === 'from') {
                        fromLocation = {
                            lat: results[0].geometry.location.lat(),
                            lng: results[0].geometry.location.lng(),
                            address: address
                        };
                    } else {
                        toLocation = {
                            lat: results[0].geometry.location.lat(),
                            lng: results[0].geometry.location.lng(),
                            address: address
                        };
                    }
                    
                    updateMapMarkers();
                    if (fromLocation && toLocation) {
                        calculateRoute();
                    }
                }
            });
        }

        // Promokodni tekshirish
        document.getElementById('applyPromo').onclick = function() {
            const code = document.getElementById('promoCode').value.trim().toUpperCase();
            const messageDiv = document.getElementById('promoMessage');
            
            if (!code) {
                messageDiv.className = 'promo-message error';
                messageDiv.textContent = 'Promokodni kiriting';
                return;
            }

            // Simulyatsiya qilingan promokodlar (bot bilan integratsiya uchun)
            const promoCodes = {
                'WELCOME10': 10,
                'WELCOME20': 20,
                'BONUS15': 15,
                'TASHKENT': 5,
                'DRIVE': 10
            };

            if (promoCodes[code]) {
                currentDiscount = promoCodes[code];
                document.getElementById('discountBadge').style.display = 'block';
                document.getElementById('discountBadge').textContent = currentDiscount + '%';
                messageDiv.className = 'promo-message success';
                messageDiv.textContent = `✅ ${currentDiscount}% chegirma qo'llandi!`;
                
                // Narxni qayta hisoblash
                if (fromLocation && toLocation) {
                    calculateRoute();
                }
            } else {
                currentDiscount = 0;
                document.getElementById('discountBadge').style.display = 'none';
                messageDiv.className = 'promo-message error';
                messageDiv.textContent = '❌ Noto\'g\'ri promokod';
            }
        };

        // Event listenerlar
        function setupEventListeners() {
            document.getElementById('fromInput').addEventListener('input', () => {
                if (!document.getElementById('fromInput').value) {
                    fromLocation = null;
                    if (fromMarker) fromMarker.setMap(null);
                }
                updateMainButton();
            });

            document.getElementById('toInput').addEventListener('input', () => {
                if (!document.getElementById('toInput').value) {
                    toLocation = null;
                    if (toMarker) toMarker.setMap(null);
                }
                updateMainButton();
            });
        }

        // Asosiy tugma holatini yangilash
        function updateMainButton() {
            const fromVal = document.getElementById('fromInput').value;
            const toVal = document.getElementById('toInput').value;
            const submitBtn = document.getElementById('submitBtn');
            
            if (fromVal && toVal) {
                submitBtn.disabled = false;
                tg.MainButton.setText('🚖 Buyurtma berish');
                tg.MainButton.show();
            } else {
                submitBtn.disabled = true;
                tg.MainButton.hide();
            }
        }

        // Buyurtma berish
        function submitOrder() {
            if (!fromLocation || !toLocation) {
                showError('Iltimos, manzillarni to\'liq kiriting');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Yuborilmoqda...';

            // Ma'lumotlarni tayyorlash
            const orderData = {
                from: document.getElementById('fromInput').value,
                to: document.getElementById('toInput').value,
                lat: fromLocation.lat,
                lon: fromLocation.lng,
                distance: parseFloat(document.getElementById('distance').textContent),
                duration: parseInt(document.getElementById('duration').textContent),
                price: parseInt(document.getElementById('price').textContent.replace(/\D/g, '')),
                promo: document.getElementById('promoCode').value.trim().toUpperCase() || ''
            };

            // Telegram Web App orqali yuborish
            tg.sendData(JSON.stringify(orderData));

            // Muvaffaqiyatli xabar
            document.getElementById('mainForm').style.display = 'none';
            document.getElementById('successMessage').classList.add('show');

            // 3 sekunddan keyin yopish
            setTimeout(() => {
                tg.close();
            }, 3000);
        }

        // Xatolik ko'rsatish
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 3000);
        }

        // Telegram main button sozlamalari
        tg.MainButton.setText('🚖 Buyurtma berish');
        tg.MainButton.onClick(submitOrder);
        tg.MainButton.hide();

        // Back button
        tg.BackButton.onClick(() => {
            if (document.getElementById('successMessage').classList.contains('show')) {
                document.getElementById('successMessage').classList.remove('show');
                document.getElementById('mainForm').style.display = 'block';
            } else {
                tg.close();
            }
        });

        // Geolokatsiya xatosi
        function handleLocationError(error) {
            let message = 'Lokatsiya aniqlanmadi';
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    message = 'Lokatsiyaga ruxsat berilmagan';
                    break;
                case error.POSITION_UNAVAILABLE:
                    message = 'Lokatsiya mavjud emas';
                    break;
                case error.TIMEOUT:
                    message = 'So\'rov vaqti tugadi';
                    break;
            }
            showError(message);
        }
    </script>
</body>
</html>
